<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas Musicais</title>

<link rel="stylesheet" href="Escala2.css">
</head>

<body>

<header class="topo">
  <div class="logo">🎸 Pista Cifra</div>
  <a href="indexEscala.html" class="btn-voltar">← Voltar</a>
</header>

<section class="info-musica">
  <h1>Escalas Maiores</h1>

  <div class="controles">
    <span class="tom">Tom: <strong id="tomAtual">C</strong></span>
    <br><br>
    <button class="btn-tom" onclick="abrirTom()">Mudar Tom</button>
  </div>
</section>

<section class="cifra-container">
  <div class="bloco">
    <h3 id="nomeEscala">C (Dó)</h3>

    <pre class="cifra" id="notasEscala">
C - D - E - F - G - A - B - C
    </pre>

    <p class="padrao">
T - T - ST - T - T - T - ST
    </p>
  </div>
</section>

<footer>
  <p>🎵 Estudo de Escalas</p>
</footer>

<!-- MODAL -->
<div class="modal-tom" id="modalTom">
  <h2>Mudar Tom</h2>

  <div class="grid-tom" id="gridTom"></div>

  <button class="btn-fechar" onclick="fecharTom()">Fechar</button>
</div>

<script src="Escala2.js"></script>

</body>
</html>
